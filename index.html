                            return (
                                <div key={item.id} className="bg-white border border-stone-200 transition-all duration-300 shadow-sm flex flex-col h-full rounded-[2.5rem] overflow-hidden group hover:-translate-y-2 hover:shadow-xl">
                                    <div className="aspect-[3/4] bg-stone-100 flex items-center justify-center relative flex-shrink-0 overflow-hidden border-b border-stone-50">
                                        {item.imageUrl ? (
                                            <img src={item.imageUrl} alt={`Case ${item.id}`} className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-stone-300 font-black text-2xl uppercase tracking-tighter">Case {item.id}</span>
                                        )}
                                        <div className="absolute top-4 left-4 bg-stone-900/90 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">IMAGE {item.id}</div>
                                    </div>
                                    <div className="p-6 md:p-8 flex flex-col flex-grow">
                                        <div className="mb-6 flex-grow">
                                            <div className="text-[10px] text-stone-400 font-black uppercase tracking-wider mb-2">{t.final_result}</div>
                                            <div className={`text-base md:text-lg font-bold leading-snug ${safe ? 'text-green-600' : 'text-orange-600'}`}>
                                                {translateText(finalStep)}
                                            </div>
                                        </div>
                                        <button onClick={() => setModalCase(item)} className="w-full py-4 bg-orange-500 text-white rounded-2xl text-xs font-black hover:bg-orange-600 transition-all shadow-md uppercase tracking-widest">
                                            {t.path_btn}
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {modalCase && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-8 md:p-10 overflow-y-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-2xl font-black tracking-tighter">{t.detail}</h3>
                                        <button onClick={() => setModalCase(null)} className="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center text-stone-500">✕</button>
                                    </div>
                                    <div className="mb-8 aspect-[3/4] max-h-[250px] mx-auto bg-stone-50 rounded-2xl overflow-hidden flex items-center justify-center relative border border-stone-100 shadow-inner">
                                        {modalCase.imageUrl ? (
                                            <img src={modalCase.imageUrl} alt={`Case ${modalCase.id}`} className="w-full h-full object-contain" />
                                        ) : (
                                            <span className="text-stone-200 font-black text-xl uppercase tracking-widest">Reference Case {modalCase.id}</span>
                                        )}
                                    </div>
                                    <div className="space-y-6 mb-8">
                                        {modalCase.path.map((stepStr, idx) => {
                                            const isLast = idx === modalCase.path.length - 1;
                                            const safe = isPureNoViolation(stepStr);
                                            let boxClass = "bg-stone-50 text-stone-600 border-stone-100";
                                            if (isLast) boxClass = safe ? "bg-green-600 text-white font-black" : "bg-orange-600 text-white font-black shadow-lg";
                                            return (
                                                <div key={idx} className="flex items-start">
                                                    <div className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs bg-stone-200 text-stone-500 mr-4 shrink-0">{idx + 1}</div>
                                                    <div className={`p-4 rounded-xl flex-grow border text-sm leading-relaxed ${boxClass}`}>
                                                        {formatPathText(stepStr)}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => setModalCase(null)} className="w-full py-4 bg-stone-900 text-white rounded-xl font-black text-xs tracking-widest uppercase hover:bg-orange-600 transition-all">
                                        {t.close}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
